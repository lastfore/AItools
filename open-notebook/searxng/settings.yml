# Minimal SearXNG override for Open Notebook web search API (JSON format required).
# Mount this directory as /etc/searxng in Docker. See examples/docker-compose-searxng.yml
#
# Docs: https://docs.searxng.org/admin/settings/settings_search.html

use_default_settings: true

server:
  secret_key: "open-notebook-dev-searxng-secret-key-change-me"

search:
  formats:
    - html
    - json
